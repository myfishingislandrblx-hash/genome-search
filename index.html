<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genome Search Platform</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
            line-height: 1.6;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .search-container {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #status {
            font-weight: bold;
            margin: 15px 0;
            color: #e67e22;
        }
        .status-success {
            color: #27ae60 !important;
        }
        .status-error {
            color: #c0392b !important;
        }
        h3 {
            margin-top: 30px;
            color: #34495e;
        }
        #results {
            white-space: pre-wrap;
            background: #f8f9fa;
            padding: 15px;
            border: 1px solid #eaeded;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            max-height: 500px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1>Genome Search Platform</h1>
    <p>Search DNA sequences using the NCBI BLAST API directly from your browser.</p>

    <div class="search-container">
        <input type="text" id="sequenceInput" placeholder="Enter DNA sequence (e.g., ATCGATTG...)" value="CCATTGCA">
        <button id="searchBtn">Search</button>
    </div>

    <div id="status">Ready to search.</div>

    <h3>Results:</h3>
    <div id="results">No search performed yet.</div>

    <script>
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const sequenceInput = document.getElementById('sequenceInput');
            const searchBtn = document.getElementById('searchBtn');
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            const sequence = sequenceInput.value.trim();

            if (!sequence) {
                alert('Please enter a DNA sequence.');
                return;
            }

            // Lock UI elements while fetching data
            searchBtn.disabled = true;
            sequenceInput.disabled = true;
            statusDiv.className = '';
            statusDiv.innerHTML = 'Connecting to NCBI BLAST via proxy bridge...';
            resultsDiv.innerText = '';

            // Constructing parameters for the submission query
            const params = new URLSearchParams();
            params.append('CMD', 'Put');
            params.append('PROGRAM', 'blastn');
            params.append('DATABASE', 'nr');
            params.append('QUERY', sequence);

            // Utilizing a public CORS proxy to circumvent browser security restrictions
            const proxy = "https://corsproxy.io/?";
            const targetUrl = `https://blast.ncbi.nlm.nih.gov/Blast.cgi?${params.toString()}`;

            try {
                const response = await fetch(proxy + encodeURIComponent(targetUrl));
                
                if (!response.ok) {
                    throw new Error(`Proxy connection error: ${response.status}`);
                }
                
                const textResponse = await response.text();
                
                // Track down the Request ID (RID) assigned by NCBI
                const ridMatch = textResponse.match(/ID\s*=\s*([A-Z0-9]+)/i) || textResponse.match(/QName\s*=\s*([A-Z0-9]+)/i);
                
                if (!ridMatch) {
                    throw new Error('NCBI busy or invalid sequence format. Could not parse RID.');
                }
                
                const rid = ridMatch[1];
                statusDiv.innerText = `Job submitted successfully! RID: ${rid}. Querying alignment queue...`;

                // Fire up the tracking loop
                pollResults(rid);

            } catch (error) {
                statusDiv.className = 'status-error';
                statusDiv.innerText = 'Submission failed.';
                resultsDiv.innerText = error.message;
                
                searchBtn.disabled = false;
                sequenceInput.disabled = false;
            }
        });

        async function pollResults(rid) {
            const sequenceInput = document.getElementById('sequenceInput');
            const searchBtn = document.getElementById('searchBtn');
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            const proxy = "https://corsproxy.io/?";
            const checkUrl = `https://blast.ncbi.nlm.nih.gov/Blast.cgi?CMD=Get&RID=${rid}&FORMAT_TYPE=JSON2`;

            // Poll the database every 12 seconds to monitor progress
            const checkInterval = setInterval(async () => {
                try {
                    const response = await fetch(proxy + encodeURIComponent(checkUrl));
                    const text = await response.text();

                    // If NCBI is still running the computation
                    if (text.includes('Status=WAITING') || text.includes('READYING')) {
                        statusDiv.innerText = `NCBI is calculating alignments (RID: ${rid})...`;
                        return;
                    }

                    // If the alignment is done, but the database cluster is assembling the JSON packet
                    if (text.includes('Status=UNKNOWN') || (!text.trim().startsWith('{') && !text.trim().startsWith('['))) {
                        statusDiv.innerText = `Alignment complete! Fetching and formatting data matrix...`;
                        return;
                    }

                    // Parse the completed payload
                    const data = JSON.parse(text);
                    
                    statusDiv.className = 'status-success';
                    statusDiv.innerText = 'Search Complete!';
                    resultsDiv.innerText = JSON.stringify(data, null, 2);
                    
                    clearInterval(checkInterval);
                    searchBtn.disabled = false;
                    sequenceInput.disabled = false;

                } catch (error) {
                    statusDiv.innerText = `Waiting for data packet stream initialization...`;
                }
            }, 12000);
        }
    </script>
</body>
</html>
