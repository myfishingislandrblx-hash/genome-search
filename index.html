<script>
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const sequenceInput = document.getElementById('sequenceInput');
            const searchBtn = document.getElementById('searchBtn');
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            const sequence = sequenceInput.value.trim();

            if (!sequence) {
                alert('Please enter a DNA sequence.');
                return;
            }

            searchBtn.disabled = true;
            sequenceInput.disabled = true;
            statusDiv.className = '';
            statusDiv.innerHTML = 'Submitting sequence to NCBI BLAST...';
            resultsDiv.innerText = '';

            const params = new URLSearchParams();
            params.append('CMD', 'Put');
            params.append('PROGRAM', 'blastn');
            params.append('DATABASE', 'nr');
            params.append('QUERY', sequence);

            try {
                const response = await fetch(`https://blast.ncbi.nlm.nih.gov/Blast.cgi?${params.toString()}`);
                
                if (!response.ok) {
                    throw new Error(`NCBI server rejected request with status: ${response.status}`);
                }
                
                const textResponse = await response.text();
                const ridMatch = textResponse.match(/ID\s*=\s*([A-Z0-9]+)/i) || textResponse.match(/QName\s*=\s*([A-Z0-9]+)/i);
                
                if (!ridMatch) {
                    console.error("Raw NCBI Response:", textResponse);
                    throw new Error('Could not parse Request ID (RID) from NCBI.');
                }
                
                const rid = ridMatch[1];
                statusDiv.innerText = `Search submitted successfully! RID: ${rid}. Waiting for NCBI queue...`;

                pollResults(rid);

            } catch (error) {
                statusDiv.className = 'status-error';
                statusDiv.innerText = 'Error submitting request.';
                resultsDiv.innerText = error.message;
                
                searchBtn.disabled = false;
                sequenceInput.disabled = false;
            }
        });

        async function pollResults(rid) {
            const sequenceInput = document.getElementById('sequenceInput');
            const searchBtn = document.getElementById('searchBtn');
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            // Explicitly requesting standard modern JSON2 format mapping
            const checkUrl = `https://blast.ncbi.nlm.nih.gov/Blast.cgi?CMD=Get&RID=${rid}&FORMAT_TYPE=JSON2`;

            // Increased interval to 15 seconds to give the server breathing room to generate reports
            const checkInterval = setInterval(async () => {
                try {
                    const response = await fetch(checkUrl);
                    const text = await response.text();

                    // Case 1: Still waiting in the alignment processing queue
                    if (text.includes('Status=WAITING') || text.includes('READYING')) {
                        statusDiv.innerText = `NCBI is still calculating sequence alignment (RID: ${rid})...`;
                        return;
                    }

                    // Case 2: Alignment is done, but NCBI is wrapping/generating the JSON package
                    if (text.includes('Status=UNKNOWN') || (!text.trim().startsWith('{') && !text.trim().startsWith('['))) {
                        statusDiv.innerText = `Alignment complete! Waiting for NCBI to build and compress the JSON data structure...`;
                        return;
                    }

                    // Case 3: Payload is a complete JSON document
                    const data = JSON.parse(text);
                    
                    statusDiv.className = 'status-success';
                    statusDiv.innerText = 'Search Complete!';
                    resultsDiv.innerText = JSON.stringify(data, null, 2);
                    
                    clearInterval(checkInterval);
                    searchBtn.disabled = false;
                    sequenceInput.disabled = false;

                } catch (error) {
                    // Safety catch to handle network hiccups without breaking the loop
                    statusDiv.innerText = `Synchronizing stream with NCBI data pipeline...`;
                }
            }, 15000); // 15-second delay between checks
        }
    </script>
